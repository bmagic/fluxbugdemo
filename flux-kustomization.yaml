apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: my-git-repository
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/bmagic/fluxbugdemo
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-kustomization
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: my-git-repository
  path: /test/base
  components:
    - ../components/foo
  prune: true
  wait: true
---
